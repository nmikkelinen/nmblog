<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link id="theme-style" rel="stylesheet" href="/{{ page.css | default: 'style.css' }}?v=4">
    <script>
        // Ser till att ditt valda färgschema laddas direkt innan sidan ritas upp
        const savedCSS = localStorage.getItem('selected-css');
        if (savedCSS) {
            document.getElementById('theme-style').setAttribute('href', '/' + savedCSS);
        }
    </script>
</head>
<body>
    <header>
        <nav>
            <a href="/index.html">Home</a>
            <a href="/templates.html">Templates</a>
            <a href="/cv.html">CV</a>
        </nav>
    </header>
    <hr>

    {% if page.id %}
    <h1>{{ page.title }}</h1>
    <div style="display: flex; gap: 12px; align-items: center; margin-top: -10px; margin-bottom: 30px;">
        <span style="font-size: 14px; color: #64748b;">{{ page.date | date: "%Y-%m-%d" }}</span>
        <div class="tag-box" style="margin: 0;">
            <a href="/index.html#{{ page.tags }}" class="tag">{{ page.tags }}</a>
        </div>
    </div>
    {% endif %}

    {{ content }}

    {% if page.id %}
    <hr>
    <footer>
        {% if page.previous %}<a href="{{ page.previous.url }}">&lt;&lt; Previous</a>{% else %}<a href="#" class="disabled">&lt;&lt; Previous</a>{% endif %}
        <a href="/index.html">Home</a>
        {% if page.next %}<a href="{{ page.next.url }}">Next &gt;&gt;</a>{% else %}<a href="#" class="disabled">Next &gt;&gt;</a>{% endif %}
    </footer>
    {% endif %}
</body>
</html>
